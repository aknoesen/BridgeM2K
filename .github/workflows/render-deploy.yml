name: Trigger Render Deploy

# Public-URL Render connections get no GitHub webhook, so Render's "On Commit" auto-deploy never
# fires. This Action runs on every push to main and triggers a deploy via the Render API, targeting
# the service by ID (explicit below, NOT hidden in a secret) so it can never point at the wrong
# service. Set the RENDER_API_KEY repo secret (Render -> Account Settings -> API Keys).
on:
  push:
    branches: [main]

jobs:
  # Gate: build + tests must pass before we deploy, so a broken push to main never reaches students.
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  deploy:
    needs: build-test            # deploy only runs if build-test succeeded
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy of benchbridge via Render API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          SERVICE_ID: srv-d900u7n7f7vs739md7o0   # benchbridge
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "RENDER_API_KEY secret is not set"; exit 1
          fi
          resp=$(curl -fsS -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -d '{"clearCache":"do_not_clear"}')
          echo "Render deploy triggered for ${SERVICE_ID}:"
          echo "$resp"

<svg viewBox="0 0 824 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BenchBridge">
  <defs>
    <filter id="lbloom" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="13"/></filter>
    <filter id="ltxt" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="5"/></filter>
    <!-- "bb" monogram: Bench = steel-white b, Bridge = Aggie Gold b -->
    <g id="lbb" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M150 132 L150 360"/>
      <path d="M150 305 a55 55 0 1 1 110 0 a55 55 0 1 1 -110 0"/>
    </g>
    <g id="lbb2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M310 132 L310 360"/>
      <path d="M310 305 a55 55 0 1 1 110 0 a55 55 0 1 1 -110 0"/>
    </g>
  </defs>
  <!-- transparent background: the page colour shows through; the glyph's own bloom is the glow -->
  <!-- icon (neon "bb", scaled to ~200) -->
  <g transform="translate(8,8) scale(0.46875)">
    <use href="#lbb" filter="url(#lbloom)" stroke="#2b5b8f" stroke-width="20"/>
    <use href="#lbb" stroke="#dfe9f5" stroke-width="22"/>
    <use href="#lbb" stroke="#ffffff" stroke-width="7.5"/>
    <use href="#lbb2" filter="url(#lbloom)" stroke="#FFBF00" stroke-width="22"/>
    <use href="#lbb2" stroke="#FFBF00" stroke-width="22"/>
    <use href="#lbb2" stroke="#FFF4D0" stroke-width="7.5"/>
  </g>
  <!-- wordmark: Bench crisp white, Bridge Aggie Gold with glow -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="700" font-size="74" letter-spacing="-1.5">
    <text x="280" y="156" fill="#FFBF00" filter="url(#ltxt)" opacity="0.5">BenchBridge</text>
    <text x="280" y="156" fill="#ffffff">Bench<tspan fill="#FFBF00">Bridge</tspan></text>
  </g>
</svg>

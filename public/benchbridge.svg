<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BenchBridge">
  <defs>
    <filter id="bloom" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="13"/></filter>
    <!-- BenchBridge "bb" monogram: two b glyphs (stem + bowl). Bench = steel-white, Bridge = Aggie Gold. -->
    <g id="bb" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M150 132 L150 360"/>
      <path d="M150 305 a55 55 0 1 1 110 0 a55 55 0 1 1 -110 0"/>
    </g>
    <g id="bb2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M310 132 L310 360"/>
      <path d="M310 305 a55 55 0 1 1 110 0 a55 55 0 1 1 -110 0"/>
    </g>
    <clipPath id="frame"><rect x="6" y="6" width="500" height="500" rx="112"/></clipPath>
  </defs>
  <!-- transparent background: the page colour shows through; the glyph's own bloom is the glow -->
  <g clip-path="url(#frame)">
    <g transform="translate(-29,0)">
      <!-- Bench: cool steel-white -->
      <use href="#bb" filter="url(#bloom)" stroke="#2b5b8f" stroke-width="20"/>
      <use href="#bb" stroke="#dfe9f5" stroke-width="22"/>
      <use href="#bb" stroke="#ffffff" stroke-width="7.5"/>
      <!-- Bridge: Aggie Gold -->
      <use href="#bb2" filter="url(#bloom)" stroke="#FFBF00" stroke-width="22"/>
      <use href="#bb2" stroke="#FFBF00" stroke-width="22"/>
      <use href="#bb2" stroke="#FFF4D0" stroke-width="7.5"/>
    </g>
  </g>
</svg>
